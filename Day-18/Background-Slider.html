<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Background-Slider</title>
    <link rel="stylesheet" href="/Day-18/Background-Slider.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>

  <body>
    <div class="slider-container">
      <div
        class="slide active"
        style="
          background-image: url('/Day-1/asset/10-Beautiful-Animals-In-Nature-48827-8.jpg');
        "
      ></div>

      <div
        class="slide "
        style="
          background-image: url('/Day-1/asset/10-Beautiful-Animals-In-Nature-48827-9.jpeg');
        "
      ></div>


      <div
        class="slide "
        style="
          background-image: url('/Day-1/asset/1280-1200-157187880-green-wings-macaw.jpg');
        "
      ></div>


      <button class="arrow left-arrow" id="left">
        <i class="fa fa-arrow-left"></i>
      </button>
      <button class="arrow right-arrow" id="right">
        <i class="fa fa-arrow-right"></i>
      </button>
    </div>

    <script src="/Day-18/Background-Slider.js"></script>
  </body>
</html>
