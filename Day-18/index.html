<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Background-Slider</title>
    <link rel="stylesheet" href="style.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>

  <body>
    <div class="slider-container">
      <div
        class="slide active"
        style="
          background-image: url('https://i.pinimg.com/1200x/91/b2/4a/91b24a90539fdd74dccb2478a855d038.jpg');
        "
      ></div>

      <div
        class="slide "
        style="
          background-image: url('https://i.pinimg.com/1200x/00/89/81/008981eff5da8ebeda4ebaae9ed5f176.jpg');
        "
      ></div>


      <div
        class="slide "
        style="
          background-image: url('https://i.pinimg.com/1200x/cc/15/cb/cc15cb2cc62c83c9f22835d25bb484f6.jpg');
        "
      ></div>


      <button class="arrow left-arrow" id="left">
        <i class="fa fa-arrow-left"></i>
      </button>
      <button class="arrow right-arrow" id="right">
        <i class="fa fa-arrow-right"></i>
      </button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
