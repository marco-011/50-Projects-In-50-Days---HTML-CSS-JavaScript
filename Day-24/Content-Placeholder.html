<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Placeholder</title>
    <link rel="stylesheet" href="Content-Placeholder.css" />
  </head>

  <body>
    <div class="card">
      
      <!-- IMAGE -->
      <div class="card-header animated-bg" id="header">
        &nbsp;
      </div>

      <!-- CONTENT -->
      <div class="card-content">
        
        <!-- TITLE -->
        <h3 class="card-title animated-bg animated-bg-text" id="title">
          &nbsp;
        </h3>

        <!-- TEXT -->
        <p class="card-excerpt" id="excerpt">
          <span class="animated-bg animated-bg-text">&nbsp;</span>
          <span class="animated-bg animated-bg-text">&nbsp;</span>
          <span class="animated-bg animated-bg-text">&nbsp;</span>
        </p>

        <!-- AUTHOR -->
        <div class="author">
          
          <!-- PROFILE IMAGE -->
          <div class="profile-img animated-bg" id="profile_img"></div>

          <!-- AUTHOR INFO -->
          <div class="author-info">
            <strong class="animated-bg animated-bg-text" id="name">
              &nbsp;
            </strong>
            <small class="animated-bg animated-bg-text" id="date">
              &nbsp;
            </small>
          </div>

        </div>
      </div>

    </div>

    <script src="Content-Placeholder.js"></script>
  </body>
</html>
