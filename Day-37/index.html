<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mobile Tab Navigation</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="phone">
      <img
        src="https://i.pinimg.com/1200x/82/09/06/820906ea1c9cd20bbac56264f59ef4ce.jpg"
        alt="home"
        class="content"
      />
      <img
        src=" https://i.pinimg.com/736x/a0/31/44/a03144f40e238d19cbe4ca9b8ec4807e.jpg"
        alt="work"
        class="content"
      />
      <img
        src="https://i.pinimg.com/736x/91/23/b8/9123b8a1c7dcba32c911a4ee5ecad762.jpg"
        alt="Blog"
        class="content"
      />
      <img
        src="https://i.pinimg.com/736x/d5/e1/51/d5e151f59d658d70508628e29ab34616.jpg"
        alt="About Us"
        class="content show"
      />
      <nav>
        <ul>
          <li class="active">
            <i class="fas fa-home"></i>
            <p>Home</p>
          </li>
          <li>
            <i class="fas fa-box"></i>
            <p>Work</p>
          </li>
          <li>
            <i class="fas fa-book-open"></i>
            <p>Blog</p>
          </li>
          <li>
            <i class="fas fa-users"></i>
            <p>About Us</p>
          </li>
        </ul>
      </nav>
    </div>

    <script src="script.js"></script>
  </body>
</html>
