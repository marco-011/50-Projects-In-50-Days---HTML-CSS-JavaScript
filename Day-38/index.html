<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Strength Background</title>
    <link rel="stylesheet" href="style.css">
     <script src="https://cdn.tailwindcss.com"></script>
    
    
</head>
<body>
     <div class="background" id="background"></div>
        <div class="bg-white rounded p-10 textcenter shadow-md">
            <h1 class="text-3xl">Image password strength</h1>
            <p class="text-gray-700 text-sm">change the password to see the effect</p>
            <div class="my-4 text-left">
                <label for="email" class="text-gray-900">Email:</label>
                <input type="email" id="email" placeholder="Enter your email" class="border block w-full p-2 mt-2 rounded ">
            </div>
            <div class="my-4 text-left">
                <label for="password" class="text-gray-900">Password:</label>
                <input type="password" id="password" placeholder="Enter your password" class="border block w-full p-2 mt-2 rounded ">
            </div>
            <button class="bg-black text-white py-2 mt-4 inline-block w-full rounded" type="submit">Submit</button>

        </div>

     
    <script src="script.js"></script>
   
</body>
</html>
