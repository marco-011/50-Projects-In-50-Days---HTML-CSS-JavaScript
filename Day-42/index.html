<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feedback UI Design</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  </head>
  <body>
    <div id="panel" class="panel-container">
      <strong
        >How satisfied are you with our <br />
        customer support performance?</strong
      >
      <div class="ratings-container">
        <div class="rating">
          <img
            src="https://i.pinimg.com/736x/c2/1b/22/c21b2299a94bc7b0040f5d055f95b4c2.jpg"
            alt=""
          />
          <small>unhappy</small>
        </div>

        <div class="rating">
          <img
          src="https://i.pinimg.com/736x/45/67/c6/4567c613f67e56302dfe2f1d9a49f449.jpg"
          alt=""
        />
          <small>Neutral</small>
        </div>
        

        <div class="rating">
          <img
            src="https://i.pinimg.com/736x/d4/10/dd/d410dd0f410e4a332b3fa9a56bcd6ea5.jpg"
            alt=""
          />
          <small>Satisfied</small>
        </div>
      </div>

      <button class="btn" id="send">Send Review</button>
    </div>
    <script src="script.js"></script>
  </body>
</html>
