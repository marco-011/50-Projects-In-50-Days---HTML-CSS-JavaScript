<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Insect Catch Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="screen">
      <h1>Catch The Insect</h1>
      <button class="btn" id="start-btn">Play Game</button>
    </div>

    <div class="screen">
      <h1>What is your "favorite" insect</h1>

      <ul class="insects-list">
        <li>
          <button class="choose-insect-btn">
            <p>Fly</p>
            <img
              src="298efbc29616ef644370da332b523f0d-removebg-preview.png"
              alt="fly"
            />
          </button>
        </li>

        <li>
          <button class="choose-insect-btn">
            <p>wasp</p>
            <img
              src="cdf3b725694812fb3735136b86de294a-removebg-preview.png"
              alt="wasp"
            />
          </button>
        </li>
         <li>
          <button class="choose-insect-btn">
            <p>wasp</p>
            <img
              src="/Day-48/Le_premier_animal_que_vous_voyez_sur_la_photo_en_révèle_beaucoup_sur_votre_personnalité_-_Sandra_Advice-removebg-preview.png"
              alt="wasp"
            />
          </button>
        </li>
      </ul>
    </div>

    <div class="screen game-container" id="game-container">
      <h3 id="time" class="time">Time: 00:00</h3>
      <h3 id="score" class="score">Score:0</h3>
      <h5 id="message" class="message">
        Are you annoyed Yet?,<br />
        you are playing an impossible game!!
      </h5>
    </div>

    <script src="script.js"></script>
  </body>
</html>
